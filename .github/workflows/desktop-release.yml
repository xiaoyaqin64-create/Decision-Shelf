name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Build portable Windows app
        shell: pwsh
        run: ./scripts/build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: Decision-Shelf-windows-x64
          path: release/Decision-Shelf-windows-x64.zip
          if-no-files-found: error

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Confirm Apple Silicon runner
        run: test "$(uname -m)" = "arm64"
      - name: Build portable macOS app
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Decision-Shelf-macos-apple-silicon
          path: release/Decision-Shelf-macos-apple-silicon.zip
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.jks
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
      - name: Test Python and Vue
        run: |
          python -m pip install -e .
          python -m unittest discover -s tests -v
          npm --prefix frontend ci
          npm --prefix frontend run test
          npm --prefix frontend run build
      - name: Compile Android app and instrumented tests
        run: gradle -p android :app:assembleDebug :app:assembleDebugAndroidTest
      - name: Restore fixed release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.jks
      - name: Build and verify signed arm64 APK
        run: |
          gradle -p android :app:assembleRelease
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose android/app/build/outputs/apk/release/app-release.apk
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/Decision-Shelf-android-arm64.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Decision-Shelf-android-arm64
          path: release/Decision-Shelf-android-arm64.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Decision-Shelf-*
          path: release
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release/*
          --repo "$GITHUB_REPOSITORY"
          --title "Decision Shelf $GITHUB_REF_NAME"
          --generate-notes
